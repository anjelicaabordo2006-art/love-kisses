<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where's My Kiss? 😘</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
/* Ginamit ang clean sans-serif font na may small-caps styling */
font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
font-variant: small-caps;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5ea8,#ffc1d9);
}

.container{
text-align:center;
color:white;
}

h1{
font-size:60px;
text-shadow:0 0 15px white;
text-transform: lowercase; /* Para mas lumitaw ang small caps effect */
}

p{
font-size:25px;
margin-top:10px;
text-transform: lowercase;
}

.buttons{
margin-top:40px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
font-variant: small-caps;
}

#yes{
background:white;
color:#ff1493;
font-weight:bold;
margin-right:15px;
}

#no{
background:#ff3366;
color:white;
position:absolute;
font-weight:bold;
}

.heart{
position:absolute;
bottom:-50px;
font-size:25px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
to{
transform:translateY(-120vh);
opacity:0;
}
}

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
from{
transform:translateY(-100px) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(720deg);
}
}

.end{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff5ea8,#ffc1d9);
}

/* Siguradong small caps din ang end screen text style */
.end h1{
font-size:55px;
text-transform: lowercase;
font-variant: small-caps;
}

.end p{
font-size:30px;
text-transform: lowercase;
font-variant: small-caps;
}

</style></head><body><div class="container"><h1>WHERE'S MY KISS? 😘</h1><p>Can I get a kiss? 💋</p><div class="buttons">
<button id="yes">OO 💋</button>
<button id="no">AYAW 🙈</button>
</div></div><script>

const noBtn = document.getElementById("no");

function moveButton(){

noBtn.style.left =
Math.random()*(window.innerWidth-120)+"px";

noBtn.style.top =
Math.random()*(window.innerHeight-80)+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

document.getElementById("yes").addEventListener("click",()=>{

document.body.innerHTML=`

<div class="end">

<h1>😘💋❤️</h1>

<h1>SORRY,<br>ADIK LANG SA KISS MO 💕</h1>

<p>Forever craving your kisses 😘</p>

<p>💌 From Your Wifey 💌</p>

</div>

`;

setInterval(createHeart,250);
setInterval(createConfetti,120);

});

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

function createConfetti(){

const conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=
`hsl(${Math.random()*360},100%,50%)`;

conf.style.animationDuration=
(3+Math.random()*3)+"s";

document.body.appendChild(conf);

setTimeout(()=>{
conf.remove();
},6000);

}

setInterval(createHeart,500);

</script></body>
</html>
